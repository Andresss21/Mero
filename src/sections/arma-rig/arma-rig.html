<section id="arma-rig">
  <div class="arma-header">
    <div class="sec-label">Configurador</div>
    <h2 class="sec-title">Arma Tu Rig</h2>
    <p class="arma-sub">Cada pieza que necesitás. En El Salvador. En 48 horas.</p>
  </div>

  <div id="rig-arena">
    <div class="rig-chassis" id="rig-chassis">

      <div class="rig-slots">

        <div class="rig-slot" id="rs-cpu">
          <div class="rig-slot-icon" aria-hidden="true">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="10" y="10" width="20" height="20" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <rect x="15" y="15" width="10" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
              <line x1="6" y1="15" x2="10" y2="15" stroke="currentColor" stroke-width="1.5"/>
              <line x1="6" y1="20" x2="10" y2="20" stroke="currentColor" stroke-width="1.5"/>
              <line x1="6" y1="25" x2="10" y2="25" stroke="currentColor" stroke-width="1.5"/>
              <line x1="30" y1="15" x2="34" y2="15" stroke="currentColor" stroke-width="1.5"/>
              <line x1="30" y1="20" x2="34" y2="20" stroke="currentColor" stroke-width="1.5"/>
              <line x1="30" y1="25" x2="34" y2="25" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="rig-slot-label">CPU</div>
        </div>

        <div class="rig-slot" id="rs-cool">
          <div class="rig-slot-icon" aria-hidden="true">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="20" cy="20" r="10" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="20" cy="20" r="4" stroke="currentColor" stroke-width="1.5"/>
              <line x1="20" y1="6" x2="20" y2="13" stroke="currentColor" stroke-width="1.5"/>
              <line x1="20" y1="27" x2="20" y2="34" stroke="currentColor" stroke-width="1.5"/>
              <line x1="6" y1="20" x2="13" y2="20" stroke="currentColor" stroke-width="1.5"/>
              <line x1="27" y1="20" x2="34" y2="20" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="rig-slot-label">Cooling</div>
        </div>

        <div class="rig-slot" id="rs-ram">
          <div class="rig-slot-icon" aria-hidden="true">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="12" y="8" width="6" height="24" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <rect x="22" y="8" width="6" height="24" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <rect x="13.5" y="12" width="3" height="3" rx="0.5" fill="currentColor" opacity="0.6"/>
              <rect x="13.5" y="18" width="3" height="3" rx="0.5" fill="currentColor" opacity="0.6"/>
              <rect x="23.5" y="12" width="3" height="3" rx="0.5" fill="currentColor" opacity="0.6"/>
              <rect x="23.5" y="18" width="3" height="3" rx="0.5" fill="currentColor" opacity="0.6"/>
            </svg>
          </div>
          <div class="rig-slot-label">RAM</div>
        </div>

        <div class="rig-slot" id="rs-ssd">
          <div class="rig-slot-icon" aria-hidden="true">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="7" y="12" width="26" height="16" rx="3" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="27" cy="20" r="4" stroke="currentColor" stroke-width="1.5"/>
              <line x1="12" y1="17" x2="20" y2="17" stroke="currentColor" stroke-width="1.5"/>
              <line x1="12" y1="20" x2="18" y2="20" stroke="currentColor" stroke-width="1.5"/>
              <line x1="12" y1="23" x2="20" y2="23" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="rig-slot-label">SSD</div>
        </div>

        <div class="rig-slot" id="rs-gpu">
          <div class="rig-slot-icon" aria-hidden="true">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="5" y="13" width="30" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <rect x="10" y="17" width="7" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
              <rect x="20" y="17" width="7" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
              <line x1="10" y1="27" x2="10" y2="32" stroke="currentColor" stroke-width="1.5"/>
              <line x1="16" y1="27" x2="16" y2="32" stroke="currentColor" stroke-width="1.5"/>
              <line x1="24" y1="27" x2="24" y2="32" stroke="currentColor" stroke-width="1.5"/>
              <line x1="30" y1="27" x2="30" y2="32" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="rig-slot-label">GPU</div>
        </div>

        <div class="rig-slot" id="rs-psu">
          <div class="rig-slot-icon" aria-hidden="true">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="5" y="11" width="30" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
              <line x1="10" y1="18" x2="30" y2="18" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2"/>
              <line x1="10" y1="23" x2="24" y2="23" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2"/>
              <circle cx="32" cy="29" r="3" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="rig-slot-label">PSU</div>
        </div>

      </div><!-- /rig-slots -->

      <div class="rig-readout" id="rig-readout">
        <div class="rig-readout-label">// RIG LISTO</div>
        <a href="https://wa.me/50300000000" class="btn-primary" target="_blank" rel="noopener">
          Cotizá tu build →
        </a>
      </div>

    </div><!-- /rig-chassis -->

    <div class="rig-log-wrap">
      <div class="rig-log-header">// TERMINAL</div>
      <div class="rig-log" id="rig-log">// Esperando componentes...</div>
    </div>

  </div><!-- /rig-arena -->
</section>
